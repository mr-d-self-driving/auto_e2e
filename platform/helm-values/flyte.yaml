# Flyte Binary chart v2.0.23 values override
# DB host/port/user/pass + S3 bucket/region are injected via Terraform set{} blocks.

# Seed the auto-e2e project
flyte-core-components:
  admin:
    seedProjects:
      - auto-e2e

# Enable pytorch plugin for PyTorchJob rendering
configuration:
  database:
    options: "sslmode=require"
  inline:
    tasks:
      task-plugins:
        enabled-plugins:
          - container
          - sidecar
          - k8s-array
          - pytorch
        default-for-task-types:
          container: container
          sidecar: sidecar
          container_array: k8s-array
          pytorch: pytorch
  auth:
    enabled: false

deployment:
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi
