# Kueue cluster-scoped objects for GPU queue management.
# Apply AFTER Kueue Helm install.
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: g6e-l40s
spec:
  nodeLabels:
    node.kubernetes.io/instance-type: g6e.4xlarge
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: WorkloadPriorityClass
metadata:
  name: research-low
value: 1000
description: "Default priority for research/sweep jobs"
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: WorkloadPriorityClass
metadata:
  name: production-high
value: 10000
description: "High priority for production training (preempts research)"
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: gpu-cq
spec:
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: auto-e2e-training
  resourceGroups:
    - coveredResources: ["cpu", "memory", "nvidia.com/gpu"]
      flavors:
        - name: g6e-l40s
          resources:
            - name: "cpu"
              nominalQuota: "14"
            - name: "memory"
              nominalQuota: "120Gi"
            - name: "nvidia.com/gpu"
              nominalQuota: "1"
  preemption:
    withinClusterQueue: LowerPriority
    reclaimWithinCohort: Never
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: gpu-queue
  namespace: auto-e2e-training
  annotations:
    kueue.x-k8s.io/default-queue: "true"
spec:
  clusterQueue: gpu-cq
