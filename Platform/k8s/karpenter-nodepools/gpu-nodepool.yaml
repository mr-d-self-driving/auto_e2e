apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-training
spec:
  template:
    metadata:
      labels:
        workload-type: gpu-training
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["g6e.4xlarge"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        # Pinned to the AZ where the GPU ODCR is held (capacity-constrained)
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["us-west-2b"]
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
  limits:
    cpu: "64"
    memory: 256Gi
    nvidia.com/gpu: "4"
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-burst
spec:
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 1m
  template:
    metadata:
      labels:
        workload-type: gpu-burst
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - g5.2xlarge
            - g5.4xlarge
            - g5.8xlarge
            - g5.12xlarge
            - g5.16xlarge
            - g5.24xlarge
            - g6.2xlarge
            - g6.4xlarge
            - g6.8xlarge
            - g6.12xlarge
            - g6.16xlarge
            - g6.24xlarge
            - gr6.4xlarge
            - gr6.8xlarge
            - g6e.2xlarge
            - g6e.4xlarge
            - g6e.8xlarge
            - g6e.12xlarge
            - g6e.16xlarge
            - g6e.24xlarge
            - g7.2xlarge
            - g7.4xlarge
            - g7.8xlarge
            - g7.12xlarge
            - g7.24xlarge
            - g7e.2xlarge
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["us-west-2a", "us-west-2b", "us-west-2c"]
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
  limits:
    cpu: "96"
    memory: 768Gi
    nodes: "1"
    nvidia.com/gpu: "4"
