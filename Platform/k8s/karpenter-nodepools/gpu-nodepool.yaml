apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-training
spec:
  template:
    metadata:
      labels:
        workload-type: gpu-training
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["g6e.4xlarge"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        # Pinned to the AZ where the GPU ODCR is held (capacity-constrained)
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["us-west-2b"]
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
  limits:
    cpu: "64"
    memory: 256Gi
    nodes: "1"
    nvidia.com/gpu: "4"
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-burst
spec:
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 1m
  template:
    metadata:
      labels:
        workload-type: gpu-burst
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            # Full three-branch training exceeds the 24 GB GPUs in G5/G6/GR6.
            # Keep burst capacity at L40S-class VRAM or larger.
            - g6e.2xlarge
            - g6e.4xlarge
            - g6e.8xlarge
            - g6e.12xlarge
            - g6e.16xlarge
            - g6e.24xlarge
            - g7e.2xlarge
            - g7e.4xlarge
            - g7e.8xlarge
            - g7e.12xlarge
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["us-west-2a", "us-west-2b", "us-west-2c"]
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
  limits:
    cpu: "96"
    memory: 768Gi
    nodes: "1"
    nvidia.com/gpu: "4"
