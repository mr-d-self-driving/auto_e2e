# MLflow community-charts/mlflow 1.8.5 values override
resources:
  requests:
    cpu: "1"
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi
postgresql:
  enabled: false
service:
  type: ClusterIP
  port: 5000

# Server args (camelcase → kebabcase). No gunicornOpts → uvicorn (FastAPI) mode,
# which enables the security middleware so CORS/allowed-hosts take effect.
extraArgs:
  corsAllowedOrigins: "*"

extraFlags:
  - serveArtifacts

# MUST be false: the chart template (deployment.yaml:324) auto-injects
# `--gunicorn-opts='--log-level=info'` when log.enabled is true. That flag is
# incompatible with the security middleware (--cors-allowed-origins) in
# MLflow 3.13, which raises "Security middleware parameters are only supported
# with the default uvicorn server" and exits code 2 at startup. Setting this
# false leaves us on uvicorn — the mode the CORS/allowed-hosts settings need.
log:
  enabled: false

# Security middleware config (uvicorn mode) — allows CloudFront UI to call ajax-api
extraEnvVars:
  MLFLOW_SERVER_ALLOWED_HOSTS: "*"
  MLFLOW_SERVER_CORS_ALLOWED_ORIGINS: "*"
