version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-2
    FLYTE_PROJECT: auto-e2e
    FLYTE_DOMAIN: development

phases:
  install:
    commands:
      # kubernetes: required to import the V1PodSpec/V1Volume models used by the
      # train/eval /dev/shm PodTemplate (#121 P0) at registration time.
      - pip install -q flytekit==1.14.9 numpy torch kubernetes --extra-index-url https://download.pytorch.org/whl/cpu
  build:
    commands:
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URL="${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - export ECR_PREFIX="${ECR_URL}"
      - |
        image_ref() {
          REPOSITORY="$1"
          DIGEST=$(aws ecr describe-images \
            --repository-name "auto-e2e/${REPOSITORY}" \
            --image-ids imageTag=latest \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          test -n "${DIGEST}" && test "${DIGEST}" != "None"
          printf '%s/auto-e2e/%s@%s' "${ECR_URL}" "${REPOSITORY}" "${DIGEST}"
        }
        export AUTO_E2E_TRAINING_IMAGE=$(image_ref training)
        export AUTO_E2E_EVAL_IMAGE=$(image_ref eval)
        export AUTO_E2E_OFFLINE_RL_IMAGE=$(image_ref offline-rl)
        export AUTO_E2E_DATA_PREP_IMAGE=$(image_ref data-prep)
      - |
        cat > /tmp/flyte.yaml << EOF
        admin:
          endpoint: dns:///k8s-flyte-flyteadm-be92e7737c-cf0d1a0f3df10f77.elb.us-west-2.amazonaws.com:81
          insecure: true
        EOF
      - >
        pyflyte --config /tmp/flyte.yaml register
        --project $FLYTE_PROJECT
        --domain $FLYTE_DOMAIN
        --image ${AUTO_E2E_TRAINING_IMAGE}
        Platform/pipelines/workflows.py
