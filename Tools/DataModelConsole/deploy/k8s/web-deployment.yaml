apiVersion: apps/v1
kind: Deployment
metadata:
  name: console-web
  namespace: console
  labels:
    app: console-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: console-web
  template:
    metadata:
      labels:
        app: console-web
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: console-web
                topologyKey: kubernetes.io/hostname
      containers:
        - name: web
          image: ${ECR_PREFIX}/auto-e2e/console-web:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "/api"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
