apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  # IngressClass is CLUSTER-scoped — no namespace field (kubectl would drop it).
  name: console-alb
spec:
  controller: eks.amazonaws.com/alb
  parameters:
    apiGroup: eks.amazonaws.com
    kind: IngressClassParams
    name: console-alb-params
---
apiVersion: eks.amazonaws.com/v1
kind: IngressClassParams
metadata:
  # IngressClassParams is CLUSTER-scoped too (api-resources: NAMESPACED=false).
  name: console-alb-params
spec:
  scheme: internal
  # SG ID from the terraform output (aws_security_group.console_alb, created
  # with a name_prefix so it has a random suffix — a name reference would not
  # resolve). apply.sh substitutes ${CONSOLE_ALB_SG_ID}. This SG is the gate on
  # the ALB: it admits HTTPS only from CloudFront's managed VPC-origin ENIs
  # (source = CloudFront-VPCOrigins-Service-SG), so nothing but CloudFront can
  # reach the ALB.
  securityGroups:
    - ${CONSOLE_ALB_SG_ID}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: console-ingress
  namespace: console
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    # HTTP:80 only. The ALB is internal and never faces viewers — CloudFront
    # terminates viewer TLS with its default cert and reaches this ALB over
    # plain HTTP through a VPC origin (origin_protocol_policy = http-only). So
    # no HTTPS listener / ACM cert on the ALB itself. The SG (admits :80 only
    # from CloudFront's managed VPC-origin ENIs) is what keeps it private.
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/group.name: console
    # Health-check settings are per-Service (see services.yaml), NOT here: an
    # Ingress-level healthcheck-path applies to every target group, which would
    # probe console-web at the API's /readyz (404) and take the UI offline. The
    # console-api Service checks /readyz, console-web checks /.
spec:
  ingressClassName: console-alb
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: console-api
                port:
                  number: 8080
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: console-api
                port:
                  number: 8080
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: console-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: console-web
                port:
                  number: 3000
